{% extends 'base.html' %}
{% block content %}
<div class="hero-section">
    <div class="hero-content">
        <i class="fa-solid fa-music hero-icon"></i>
        <h1 class="hero-title">Sreedhar Play</h1>
        <p class="hero-subtitle">Stream high-fidelity audio. Curate your perfect collection.<br>Step into the future of music.</p>
        
        <div class="hero-buttons">
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('home') }}" class="hero-btn hero-btn-primary">Enter Dashboard</a>
            {% else %}
                <a href="{{ url_for('signup') }}" class="hero-btn hero-btn-primary">Get Started</a>
                <a href="{{ url_for('login') }}" class="hero-btn hero-btn-secondary">Login</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
